<div class="photos-component-container">
  <app-page-toolbar>
    <div class="photos-toolbar">
      <div class="photos-toolbar-row">
        <div class="photos-toolbar-filters">
          <mat-form-field class="photos-filter-field">
            <mat-label>Filter</mat-label>
            <input
              matInput
              [(ngModel)]="searchTerm"
              name="searchTerm"
              (ngModelChange)="onSearchTermChange($event)"
            />
            <button
              *ngIf="searchTerm !== ''"
              matSuffix
              mat-icon-button
              aria-label="Clear"
              (click)="clearSearchTerm()"
            >
              <mat-icon>close</mat-icon>
            </button>
          </mat-form-field>
        </div>

        <div class="d-md-none">
          <button
            mat-stroked-button
            [matMenuTriggerFor]="menu"
          >
            Sort
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="sortPhotosBy(sortRandomly, 'random')">Random</button>
            <button mat-menu-item (click)="sortPhotosBy(sortByYearTaken, 'taken')">Date Taken</button>
            <button mat-menu-item (click)="sortPhotosBy(sortByDateAdded, 'added')">Recently Added</button>
          </mat-menu>
        </div>

        <div class="photos-sort-controls d-none d-md-block">
          <button
            class="photos-sort-btn"
            [class.active]="sortType === 'random'"
            (click)="sortPhotosBy(sortRandomly, 'random')"
          >Random</button>
          <button
            class="photos-sort-btn"
            [class.active]="sortType === 'taken'"
            (click)="sortPhotosBy(sortByYearTaken, 'taken')"
          >Year Taken</button>
          <button
            class="photos-sort-btn"
            [class.active]="sortType === 'added'"
            (click)="sortPhotosBy(sortByDateAdded, 'added')"
          >Recently Added</button>
        </div>
      </div>
    </div>
  </app-page-toolbar>

  <div class="d-flex flex-column">
    <app-photo-upload-progress
      *ngFor="let upload of photoUploads"
      [upload]="upload"
      (completeUploadEvent)="completePhotoUpload(upload)"
    ></app-photo-upload-progress>
  </div>

  <div
    class="photos-skeleton-grid"
    *ngIf="showSpinner"
  >
    <div
      class="photos-skeleton-card"
      *ngFor="let i of skeletonIterations"
    >
      <div class="skeleton-image"></div>
      <div class="skeleton-photo-info">
        <div class="skeleton-photo-line short"></div>
        <div class="skeleton-photo-line xs"></div>
        <div class="skeleton-photo-line medium"></div>
        <div class="skeleton-photo-line"></div>
      </div>
    </div>
  </div>
</div>

<div id="lightgallery">
  <div [hidden]="showSpinner">
    <mat-card
      class="photo-card mat-elevation-z6 col-xs-10 col-sm-8 col-md-6 mt-3 mb-3"
      *ngFor="let photo of loadedPhotos"
    >
      <!-- <a href="{{ photo.url }}" class="light-link"> -->
      <img
        class="photo-image"
        mat-card-image
        src="{{ photo.url }}"
        alt="{{ photo.info }}"
      />
      <!-- </a> -->
      <mat-card-content *ngIf="!photo.isEditable">
        <div class="photo-by">
          <span *ngIf="photo.takenBy">{{ photo.takenBy }}<br /></span>
        </div>
        <div class="mt-1">
          <span *ngIf="photo.info">{{ photo.info }}<br /></span>
          <span *ngIf="photo.location">{{ photo.location }}<br /></span>
          <span *ngIf="photo.year"
            ><i
              ><span *ngIf="photo.isYearCirca">c. </span>{{ photo.year
              }}<br /></i
          ></span>
        </div>
      </mat-card-content>
      <mat-card-footer
        class="photos-controls-container d-flex justify-content-end mb-1"
      >
        <button
          mat-icon-button
          (click)="downloadPhoto(photo)"
          *ngIf="!photo.isEditable"
          matTooltip="Download"
        >
          <mat-icon>cloud_download</mat-icon>
        </button>
        <button
          mat-icon-button
          *ngIf="user.roles && user.roles.admin && !photo.isEditable"
          (click)="photo.isEditable = true"
          matTooltip="Edit"
        >
          <mat-icon>edit</mat-icon>
        </button>
      </mat-card-footer>
      <mat-card-footer
        *ngIf="user.roles && user.roles.admin && photo.isEditable"
        class="photo-edit-footer"
      >
        <div class="photo-edit-form">
          <mat-form-field class="photo-edit-field">
            <mat-label>Info</mat-label>
            <input
              matInput
              name="photoInfo"
              [(ngModel)]="photo.info"
            />
          </mat-form-field>

          <mat-form-field class="photo-edit-field photo-edit-field--full">
            <mat-label>Location</mat-label>
            <input
              matInput
              name="photo-location"
              [(ngModel)]="photo.location"
            />
          </mat-form-field>

          <div class="photo-edit-row">
            <mat-form-field class="photo-edit-field year-field">
              <mat-label>Year</mat-label>
              <input
                matInput
                type="number"
                name="photoYear"
                [(ngModel)]="photo.year"
              />
            </mat-form-field>

            <mat-checkbox
              name="photo-year-circa"
              [(ngModel)]="photo.isYearCirca"
              class="photo-edit-checkbox"
            >
              <span class="photo-edit-checkbox-label">circa</span>
            </mat-checkbox>
          </div>

          <mat-form-field class="photo-edit-field">
            <mat-label>Photo By</mat-label>
            <input
              matInput
              name="photo-by"
              [(ngModel)]="photo.takenBy"
            />
          </mat-form-field>
        </div>

        <div class="photo-edit-actions">
          <button
            mat-icon-button
            (click)="deletePhoto(photo)"
            matTooltip="Delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
          <button
            mat-icon-button
            (click)="photo.isEditable = false"
            matTooltip="Cancel"
          >
            <mat-icon>cancel</mat-icon>
          </button>
          <button
            mat-icon-button
            (click)="updatePhoto(photo)"
            matTooltip="Save"
          >
            <mat-icon>save</mat-icon>
          </button>
        </div>
      </mat-card-footer>
    </mat-card>

    <app-no-results-message
      *ngIf="loadedPhotos.length === 0 && searchTerm && !showSpinner"
      [searchTerm]="searchTerm"
    ></app-no-results-message>

    <div class="d-flex justify-content-center m-5" *ngIf="!(loadedPhotos.length === 0 && searchTerm && !showSpinner)">
      <button
        mat-raised-button
        color="primary"
        (click)="loadMorePhotos(10)"
      >
        Load More
      </button>
    </div>
  </div>
</div>

<app-person-detail-modal
  *ngIf="selectedPersonId"
  [personId]="selectedPersonId"
  (closeModal)="closeModal()"
  (openPerson)="openPersonDetail($event)"
></app-person-detail-modal>
