<div class="admin-calendar-page">
  <header class="page-header">
    <div class="header-left">
      <h1>Calendar Events</h1>
      <p class="subtitle">{{ allEvents?.length || 0 }} total events</p>
    </div>
    <div class="header-right">
      <button mat-raised-button color="primary" (click)="onAddEvent()">
        <mat-icon>add</mat-icon>
        New Event
      </button>
    </div>
  </header>

  <div class="filters-bar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search events</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="sortSettings.activeFilterQuery"
        (input)="onFilterQueryChange($event.target.value)"
      />
      <mat-icon matSuffix *ngIf="!sortSettings.activeFilterQuery">search</mat-icon>
      <button *ngIf="sortSettings.activeFilterQuery" matSuffix mat-icon-button (click)="onFilterQueryChange('')">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <div class="display-toggles">
      <mat-checkbox
        *ngFor="let displayToggle of sortSettings.displayToggles"
        (change)="toggleDisplay($event, displayToggle.id)"
        [(ngModel)]="sortSettings.displayToggleStates[displayToggle.id]"
        class="toggle-chip"
      >
        {{ displayToggle.name }}
      </mat-checkbox>
    </div>

    <div class="spacer"></div>

    <mat-paginator
      class="transparent-paginator"
      [length]="sortSettings.totalItems"
      [pageSize]="sortSettings.itemsPerPage"
      (page)="onUpdatePage($event)"
    ></mat-paginator>
  </div>

  <div class="events-grid" *ngIf="displayedEvents?.length > 0">
    <mat-card class="event-card" *ngFor="let event of displayedEvents">
      <div class="event-header">
        <mat-form-field class="event-title-field">
          <input
            matInput
            placeholder="Event title"
            [(ngModel)]="event.title"
          />
        </mat-form-field>
        <div class="event-type-badge" [class]="'type-' + event.type">
          {{ event.type | titlecase }}
        </div>
      </div>

      <div class="event-body">
        <div class="event-row">
          <mat-icon>calendar_today</mat-icon>
          <mat-form-field appearance="outline" class="date-field">
            <input
              matInput
              [matDatepicker]="picker"
              [(ngModel)]="event.date"
              placeholder="Date"
            />
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker touchUi #picker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="event-row">
          <mat-icon>person</mat-icon>
          <mat-form-field appearance="outline" class="person-field">
            <mat-label>Person</mat-label>
            <mat-select [(ngModel)]="event.personId">
              <mat-option [value]="null">None</mat-option>
              <mat-option *ngFor="let person of peopleService.people$ | async" [value]="person.id">
                {{ person.name }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="event-row living-row">
          <mat-checkbox [(ngModel)]="event.isLiving" class="living-checkbox">Living</mat-checkbox>
        </div>
      </div>

      <div class="event-actions">
        <button
          mat-raised-button
          color="accent"
          *ngIf="!event.id"
          (click)="onCreateEvent(event)"
          class="action-btn create"
        >
          <mat-icon>add</mat-icon>
          Create
        </button>
        <button
          mat-raised-button
          color="primary"
          *ngIf="event.id"
          (click)="onSaveEvent(event)"
          class="action-btn save"
        >
          <mat-icon>save</mat-icon>
          Save
        </button>
        <button
          mat-stroked-button
          color="warn"
          *ngIf="event.id"
          (click)="onDeleteEvent(event)"
          class="action-btn delete"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-card>
  </div>

  <div class="empty-state" *ngIf="!displayedEvents?.length">
    <mat-icon>event_busy</mat-icon>
    <h3>No events found</h3>
    <p>Try adjusting your search or filters, or add a new event.</p>
    <button mat-raised-button color="primary" (click)="onAddEvent()">
      <mat-icon>add</mat-icon>
      Add Event
    </button>
  </div>
</div>
