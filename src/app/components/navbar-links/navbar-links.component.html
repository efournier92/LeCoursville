<div
  id="lecoursville-navbar-links"
  class="toolbar-routes-buttons-inline"
  *ngIf="!isMenuList"
>
  <button
    mat-button
    *ngFor="let button of filteredButtons"
    [routerLink]="button.link"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{exact: button.link === '/'}"
  >
    <mat-icon class="navbar-link-icon">{{ button.icon }}</mat-icon>
    <span><span class="first-char">{{ button.title.charAt(0) }}</span>{{ button.title.slice(1) }}</span>
  </button>
</div>

<div
  *ngIf="isMenuList"
  class="toolbar-routes-buttons-inline"
>
  <button
    mat-menu-item
    *ngFor="let button of filteredButtons"
    [routerLink]="button.link"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{exact: button.link === '/'}"
  >
    <mat-icon class="navbar-link-icon">{{ button.icon }}</mat-icon>
    <span><span class="first-char">{{ button.title.charAt(0) }}</span>{{ button.title.slice(1) }}</span>
  </button>
</div>
