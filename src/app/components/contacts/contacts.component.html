<div class="contacts-container">
  <app-page-toolbar>
    <mat-form-field class="filter-people-form-field">
      <mat-label>Filter</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="searchTerm"
        (input)="onFilterChange(searchTerm)"
      />
      <button
        *ngIf="searchTerm"
        matSuffix
        mat-icon-button
        aria-label="Clear"
        (click)="clearFilter()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <mat-form-field class="family-filter-form-field">
      <mat-label>By Family</mat-label>
      <mat-select [(value)]="selectedClan" (selectionChange)="onClanChange()" panelClass="clan-select-panel">
        <mat-option *ngFor="let clan of getClans()" [value]="clan.name">{{ clan.name }}</mat-option>
      </mat-select>
      <button *ngIf="selectedClan" matSuffix mat-icon-button aria-label="Clear" (click)="clearClanFilter(); $event.stopPropagation()">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
  </app-page-toolbar>

  <div class="contacts-skeleton-grid" *ngIf="contacts.length === 0 && !searchTerm && !selectedClan">
    <div
      class="contacts-skeleton-card"
      *ngFor="let i of skeletonIterations"
    >
      <div class="skeleton-header">
        <div class="skeleton-name-line"></div>
      </div>
      <div class="skeleton-content">
        <div class="skeleton-section">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line"></div>
        </div>
        <div class="skeleton-section">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
        <div class="skeleton-section">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="contacts-grid" *ngIf="contacts.length > 0">
    <app-contact-card
      *ngFor="let card of contacts"
      [contactCard]="card"
      (personClick)="openPersonDetail($event)"
      (spouseClick)="openPersonDetail($event)">
    </app-contact-card>
  </div>

  <app-no-results-message
    *ngIf="contacts.length === 0 && (searchTerm || selectedClan) && searchTerm"
    [searchTerm]="searchTerm"
  ></app-no-results-message>
</div>

<app-person-detail-modal
  *ngIf="selectedPersonId"
  [personId]="selectedPersonId"
  (closeModal)="closeModal()"
  (openPerson)="openPersonDetail($event)">
</app-person-detail-modal>
