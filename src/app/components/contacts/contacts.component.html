<div class="contacts-container">
  <div class="w-100 filter-row">
    <mat-form-field class="filter-people-form-field">
      <mat-label>Filter</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="searchTerm"
        (input)="onFilterChange(searchTerm)"
      />
      <button
        *ngIf="searchTerm"
        matSuffix
        mat-icon-button
        aria-label="Clear"
        (click)="clearFilter()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <mat-form-field class="family-filter-form-field">
      <mat-label>Clan</mat-label>
      <mat-select [(value)]="selectedClan" (selectionChange)="onClanChange()" panelClass="clan-select-panel">
        <mat-option *ngFor="let clan of getClans()" [value]="clan.name">{{ clan.name }}</mat-option>
      </mat-select>
      <button *ngIf="selectedClan" matSuffix mat-icon-button aria-label="Clear" (click)="clearClanFilter(); $event.stopPropagation()">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <div class="contacts-grid">
    <app-contact-card
      *ngFor="let card of contacts"
      [contactCard]="card"
      (personClick)="openPersonDetail($event)"
      (spouseClick)="openPersonDetail($event)">
    </app-contact-card>
  </div>

  <div class="empty-state" *ngIf="contacts.length === 0">
    <p *ngIf="searchTerm">No contacts match your search.</p>
    <p *ngIf="!searchTerm">No contacts found.</p>
  </div>
</div>

<app-person-detail-modal
  *ngIf="selectedPersonId"
  [personId]="selectedPersonId"
  (closeModal)="closeModal()"
  (openPerson)="openPersonDetail($event)">
</app-person-detail-modal>
